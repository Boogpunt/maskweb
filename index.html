<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, orientation=portrait">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Mask</title>
<link rel="stylesheet" href="style.css?v=17">
</head>
<body>

  <!-- Webcam — base layer behind video -->
  <div id="webcam-container">
    <canvas id="webcam-canvas"></canvas>
  </div>

  <!-- Fullscreen mask videos — overlay blend on top of webcam -->
  <div id="video-container">
<video id="trans_1_2" class="mask-video" src="assets/videos/mask_1_2.mp4" preload="auto" muted playsinline></video>
    <video id="trans_1_3" class="mask-video" src="assets/videos/mask_1_3.mp4" preload="auto" muted playsinline></video>
    <video id="trans_2_1" class="mask-video" src="assets/videos/mask_2_1.mp4" preload="auto" muted playsinline></video>
    <video id="trans_2_3" class="mask-video" src="assets/videos/mask_2_3.mp4" preload="auto" muted playsinline></video>
    <video id="trans_3_1" class="mask-video" src="assets/videos/mask_3_1.mp4" preload="auto" muted playsinline></video>
    <video id="trans_3_2" class="mask-video" src="assets/videos/mask_3_2.mp4" preload="auto" muted playsinline></video>
    <video id="trans_1_0" class="mask-video" src="assets/videos/mask_1_0.mp4" preload="auto" muted playsinline></video>
    <video id="trans_2_0" class="mask-video" src="assets/videos/mask_2_0.mp4" preload="auto" muted playsinline></video>
    <video id="trans_3_0" class="mask-video" src="assets/videos/mask_3_0.mp4" preload="auto" muted playsinline></video>
    <canvas id="reverse-canvas" class="mask-video"></canvas>
  </div>

  <!-- Detection overlay — bounding boxes -->
  <canvas id="detection-overlay"></canvas>

  <!-- p5.js + ml5.js via CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <script src="https://unpkg.com/ml5@1/dist/ml5.min.js"></script>
  <script src="sketch.js?v=17"></script>
</body>
</html>
